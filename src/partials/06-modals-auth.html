<!-- ═══════════════════════════════
     MODALS — Auth
     ═══════════════════════════════ -->

<!-- Modal: Đăng nhập / Đăng ký (redirect) -->
<div class="ov" id="login-modal" onclick="closeOvOutside(event,'login-modal')">
  <div class="modal" style="padding:2rem;max-width:520px;text-align:center">
    <button class="modal-close" onclick="closeModal('login-modal')">✕</button>
    <div style="font-size:48px;margin-bottom:.75rem">🔐</div>
    <h2 style="font-size:20px;font-weight:900;color:var(--brown);margin-bottom:.5rem">Đăng nhập / Đăng ký</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:1rem">Bạn sẽ được chuyển đến trang riêng để đăng nhập hoặc tạo tài khoản.</p>
    <button class="btn-main" onclick="window.location.href='src/partials/auth.html'">Đi đến trang đăng nhập</button>
  </div>
</div>

<!-- Modal: Đăng xuất -->
<div class="ov" id="logout-modal" onclick="closeOvOutside(event,'logout-modal')">
  <div class="modal" style="padding:1.5rem;max-width:420px;text-align:center">
    <button class="modal-close" onclick="closeModal('logout-modal')">✕</button>
    <div style="font-size:48px;margin-bottom:.75rem">🚪</div>
    <h2 style="font-size:18px;font-weight:900;color:var(--brown);margin-bottom:.5rem">Bạn muốn đăng xuất?</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:1rem">Bạn vẫn có thể đăng nhập lại bất cứ lúc nào.</p>
    <div style="display:flex;gap:10px">
      <button class="btn-out" style="margin-top:0" onclick="closeModal('logout-modal')">Hủy</button>
      <button class="btn-main" style="margin-top:0" onclick="closeModal('logout-modal');doLogout()">Đăng xuất</button>
    </div>
  </div>
</div>
