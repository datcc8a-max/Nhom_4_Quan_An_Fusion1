<header>
  <div class="header-inner">

    <!-- Logo -->
    <a class="logo" href="#" onclick="showPage('menu');return false">
      <img src="images/logo-fusion.png" alt="Logo" class="logo-icon" style="height: 60px; width: 60px; object-fit: contain; border-radius: 8px;">
      <div>
        <span class="logo-name">Quán ăn Fusion</span>
        <span class="logo-tag">Hà Nội</span>
      </div>
    </a>

    <!-- Thanh tìm kiếm -->
    <div class="header-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Tìm phở, cơm, bánh mì…" id="search-input" autocomplete="off">
    </div>

    <!-- Vị trí giao hàng -->
    <button class="header-loc" id="header-loc-btn" onclick="requestUserLocation()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M20 10c0 6-8 13-8 13s-8-7-8-13a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
      <span id="header-loc-text">Giao đến tôi</span>
    </button>

    <!-- Navigation -->
    <nav>
      <button class="nav-btn active" id="nav-menu" onclick="showPage('menu')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Thực đơn</span>
      </button>
      <button class="nav-btn" id="nav-orders" onclick="showPage('orders')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="m9 12 2 2 4-4"/></svg>
        <span>Đơn hàng</span>
      </button>
      <button class="nav-btn" id="nav-profile" onclick="showPage('profile')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span>Tài khoản</span>
      </button>
      <button class="nav-btn" id="nav-login" onclick="openLoginModal('login')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13 12H3"/></svg>
        <span>Đăng nhập</span>
      </button>
      <button class="nav-btn" id="nav-logout" onclick="openModal('logout-modal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        <span>Đăng xuất</span>
      </button>
      <button class="nav-btn" id="nav-admin" onclick="showPage('admin')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M8 16h5M8 8h8"/></svg>
        <span>Admin</span>
      </button>
    </nav>

    <!-- Giỏ hàng dropdown -->
    <div class="cart-drop-wrap">
      <button class="cart-pill" onclick="toggleCartDropdown()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Giỏ hàng
        <span class="c-badge" id="cart-count">0</span>
      </button>
      <div class="cart-dropdown" id="cart-dropdown">
        <div class="cart-top">
          <div class="cart-t">Giỏ hàng của bạn</div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="cart-count-tag" id="cart-count-tag">0 món</span>
            <button class="clear-btn" onclick="clearCart();closeCartDropdown()">Xóa tất cả</button>
          </div>
        </div>
        <div class="cart-body" id="cart-dropdown-body">
          <div class="cart-empty-state">
            <img src="images/foods/img_efcf13a5.jpg" alt="Giỏ trống">
            <p style="font-weight:700;font-size:14px;color:var(--text);margin-bottom:4px">Giỏ hàng đang trống</p>
            <p>Chọn món ngon và thêm vào đây nhé!</p>
          </div>
        </div>
        <div class="cart-bot" id="cart-dropdown-bot" style="display:none">
          <textarea class="note-in" rows="2" id="order-note" placeholder="Ghi chú: không ớt, thêm rau, bỏ hành…"></textarea>
          <div class="promo-wrap">
            <input class="promo-in" type="text" id="promo-code" placeholder="Mã giảm giá (VD: PHOGIA20)">
            <button class="promo-go" onclick="applyPromo()">Áp dụng</button>
          </div>
          <div class="sum-row"><span>Tạm tính</span><span id="s-sub">0đ</span></div>
          <div class="sum-row"><span>Phí giao hàng</span><span id="s-ship">15.000đ</span></div>
          <div class="sum-row disc" id="s-disc-row" style="display:none"><span>Giảm giá 🎉</span><span id="s-disc-amt"></span></div>
          <div class="sum-row tot"><span>Tổng cộng</span><span id="s-total" style="color:var(--orange)">0đ</span></div>
          <button class="cko-btn" onclick="closeCartDropdown();openCheckout()" id="cko-btn" style="margin-top:1rem">Đặt hàng ngay →</button>
        </div>
      </div>
    </div>

  </div>
</header>
