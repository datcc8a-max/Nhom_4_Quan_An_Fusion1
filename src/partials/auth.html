<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Đăng nhập hoặc tạo tài khoản Quán ăn Fusion">
  <title>Đăng nhập / Đăng ký – Quán ăn Fusion</title>
  <link rel="stylesheet" href="../../css/base/variables.css">
  <link rel="stylesheet" href="../../css/base/reset.css">
  <link rel="stylesheet" href="../../css/pages/auth.css">
</head>
<body>
  <div class="auth-card">
    <div class="logo">
      <img src="../../images/logo-fusion.png" alt="Logo" class="logo-icon" style="height: 80px; width: 80px; object-fit: contain; border-radius: 12px; margin-bottom: 10px;">
      <h2>Quán ăn Fusion</h2>
      <p>Đăng nhập để đặt hàng và tích điểm</p>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Đăng nhập</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Đăng ký</button>
    </div>

    <!-- Form đăng nhập -->
    <div id="login-panel">
      <div class="form-sec">
        <label class="f-label">Tài khoản</label>
        <input class="f-in" id="l-user" type="text" placeholder="SĐT hoặc Email">
      </div>
      <div class="form-sec">
        <label class="f-label">Mật khẩu</label>
        <input class="f-in" id="l-pass" type="password" placeholder="Vui lòng nhập mật khẩu" onkeydown="if(event.key==='Enter')doLogin()">
        <span class="forgot-link" onclick="showForgotPasswordForm()">Quên mật khẩu?</span>
      </div>
      <button class="btn-main" onclick="doLogin()">Đăng nhập</button>
      <div class="divider"><span>hoặc</span></div>
      <button class="social-btn" onclick="doSocialLogin('Google')">
        <span class="social-icon">
          <svg viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20c11.045 0 20-8.955 20-20 0-1.341-.138-2.65-.389-3.917z"/>
            <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
            <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
            <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 01-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
          </svg>
        </span>
        <span>Tiếp tục với Google</span>
      </button>
      <button class="social-btn" onclick="doSocialLogin('Facebook')">
        <span class="social-icon">
          <svg viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#1877F2" d="M24 5a19 19 0 0 0-3 37.8V29.3h-4.2V24H21v-3.7c0-4.1 2.4-6.4 6.2-6.4 1.8 0 3.7.3 3.7.3v4.1h-2.1c-2.1 0-2.7 1.3-2.7 2.7V24h4.7l-.7 5.3h-4V42.8A19 19 0 0 0 24 5z"/>
          </svg>
        </span>
        <span>Tiếp tục với Facebook</span>
      </button>
    </div>

    <!-- Form đăng ký -->
    <div id="register-panel" style="display:none">
      <div class="f-row">
        <div class="form-sec">
          <label class="f-label">Họ</label>
          <input class="f-in" id="r-first" type="text" placeholder="Nguyễn">
        </div>
        <div class="form-sec">
          <label class="f-label">Tên</label>
          <input class="f-in" id="r-last" type="text" placeholder="Văn A">
        </div>
      </div>
      <div class="form-sec">
        <label class="f-label">Số điện thoại</label>
        <input class="f-in" id="r-phone" type="text" placeholder="0912 345 678">
      </div>
      <div class="form-sec">
        <label class="f-label">Email</label>
        <input class="f-in" id="r-email" type="email" placeholder="email@gmail.com">
      </div>
      <div class="form-sec">
        <label class="f-label">Mật khẩu</label>
        <input class="f-in" id="r-pass" type="password" placeholder="Ít nhất 8 ký tự">
      </div>
      <div class="form-sec">
        <label class="f-label">Nhập lại mật khẩu</label>
        <input class="f-in" id="r-confirm" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <button class="btn-main" onclick="doRegister()">Tạo tài khoản</button>
    </div>

    <!-- Form quên mật khẩu -->
    <div id="forgot-panel" style="display:none">
      <div class="form-sec">
        <label class="f-label">Email đã đăng ký</label>
        <input class="f-in" id="f-email" type="email" placeholder="yourname@gmail.com">
      </div>
      <div class="form-sec">
        <label class="f-label">Mật khẩu mới</label>
        <input class="f-in" id="f-pass" type="password" placeholder="Ít nhất 8 ký tự">
      </div>
      <div class="form-sec">
        <label class="f-label">Nhập lại mật khẩu mới</label>
        <input class="f-in" id="f-confirm" type="password" placeholder="••••••••">
      </div>
      <button class="btn-main" onclick="doForgotPassword()">Đặt lại mật khẩu</button>
      <button class="btn-out" onclick="hideForgotPasswordForm()" style="margin-top:10px">Quay lại đăng nhập</button>
    </div>

    <div id="msg" class="msg"></div>
  </div>

  <!-- Auth JS (theo thứ tự phụ thuộc) -->
  <script src="../../js/core/config.js"></script>
  <script src="../../js/core/storage.js"></script>
  <script>
    // switchTab: chuyển giữa đăng nhập / đăng ký
    function switchTab(tab) {
      document.getElementById('login-panel').style.display    = tab === 'login'    ? '' : 'none';
      document.getElementById('register-panel').style.display = tab === 'register' ? '' : 'none';
      document.getElementById('forgot-panel').style.display   = 'none';
      document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
      var activeTab = document.getElementById('tab-' + tab);
      if (activeTab) activeTab.classList.add('active');
    }
  </script>
  <script src="../../js/auth/login.js"></script>
  <script src="../../js/auth/register.js"></script>
  <script src="../../js/auth/forgot-password.js"></script>
  <script src="../../js/auth/social-login.js"></script>
</body>
</html>
